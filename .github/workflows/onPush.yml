name: On push

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
      
      - name: Install the Android C++ compiler
        run: |
          cd "${HOME}"
          NDK_VERSION="r29"
          wget "https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip"
          unzip "android-ndk-${NDK_VERSION}-linux.zip"
          rm "android-ndk-${NDK_VERSION}-linux.zip"
          echo "${HOME}/android-ndk-${NDK_VERSION}/toolchains/llvm/prebuilt/linux-x86_64/bin" >> "${GITHUB_PATH}"
      
      - name: Build
        run: |
          cd "${{ github.workspace }}"
          chmod 744 ./build.sh && ./build.sh
        env:
          TZ: 'Asia/Hong_Kong'
      
      - name: Prepare the artifact
        id: artifact
        run: |
          cd "${{ github.workspace }}"
          artifact="$(basename "$(find Release -type f | sort | tail -1)")"
          echo "artifact=${artifact}" >> "${GITHUB_OUTPUT}"
      
      - name: Upload the artifact
        uses: actions/upload-artifact@v7
        with:
          path: ${{ github.workspace }}/Release/${{ steps.artifact.outputs.artifact }}
          archive: false
          if-no-files-found: error
      
      - name: Prepare information
        id: information
        run: |
          echo "time=HKT $(TZ='Asia/Hong_Kong' date '+%Y%m%d%H%M%S')" >> "${GITHUB_OUTPUT}"
          if git rev-parse --verify HEAD~1 >/dev/null 2>&1;
          then
            changes="$(git diff --stat HEAD~1 HEAD)"
          else
            changes="$(git show --stat HEAD)"
          fi
          echo "changes<<EOF" >> "${GITHUB_OUTPUT}"
          echo "${changes}" >> "${GITHUB_OUTPUT}"
          echo "EOF" >> "${GITHUB_OUTPUT}"
      
      - name: Notify updates
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            New Push to GitHub! 
            
            - Repository: [${{ github.repository }}](${{ github.server_url }}/${{ github.repository }})
            - Branch: [${{ github.ref_name }}](${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }})
            - Commit: [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            - Workflow: [Run #${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - Time: ${{ steps.information.outputs.time }}
            
            Changes: 
            ```
            ${{ steps.information.outputs.changes }}
            ```