name: On pull request

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            cpp
            src
            build.sh
      
      - name: Install Android C++ compiler
        run: |
          cd "${{ github.workspace }}"
          wget -q https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
          unzip -q android-ndk-r27c-linux.zip
          rm android-ndk-r27c-linux.zip
          echo "android-ndk-r27c/toolchains/llvm/prebuilt/linux-x86_64/bin" >> "${GITHUB_PATH}"
      
      - name: Build
        run: |
          cd "${{ github.workspace }}"
          sed '/^# Log (31--33) #$/,/^# Exit #$/d' build.sh | bash
        env:
          TZ: 'Asia/Hong_Kong'
      
      - name: Prepare the artifact
        id: artifact
        run: |
          cd "${{ github.workspace }}"
          artifact="$(basename "$(find Release -type f | sort | tail -1)")"
          echo "artifact=${artifact}" >> "${GITHUB_OUTPUT}"
      
      - name: Upload the artifact
        uses: actions/upload-artifact@v7
        with:
          path: ${{ github.workspace }}/Release/${{ steps.artifact.outputs.artifact }}
          archive: false
          if-no-files-found: error