<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Bypasser</title>
		<style>
			body {
				font-family: sans-serif;
				font-size: 16px;
				color: #FFFFFF;
				background-color: black;
				padding-top: var(--window-inset-top);
				padding-bottom: var(--window-inset-bottom);
			}
			.caption {
				color: #FFFFFF;
				font-size: 18px;
				margin-top: 20px;
				margin-bottom: 20px;
			}
			.container {
				color: #EEEEEE;
				background-color: rgba(85, 85, 85, 0.5);
				margin-bottom: 15px;
				padding: 10px;
				border-radius: 10px;
			}
			.content {
				margin-top: 1px;
				margin-left: 20px;
				margin-bottom: 1px;
			}
			
			.fatalColor {
				color: red;
			}
			.errorColor {
				color: yellow;
			}
			.warningColor {
				color: orange;
			}
			.loadingColor {
				color: #3377FF; /* blue; */
			}
			.informationColor {
				color: #00FF00; /* green; */
			}
			
			a:link {
				color: #00DD00;
				text-decoration: none;
			}
			a:visited {
				color: #00CC00;
				text-decoration: none;
			}
			a:hover {
				color: #00EE00;
				text-decoration: underline;
			}
			a:active {
				color: #00FF00;
				text-decoration: underline;
			}
			
			.buttonGroup {
				display: flex;
				gap: 20px;
			}
			button {
				font-family: inherit;
				font-size: 14px;
				font-weight: bold;
				color: #00FF00;
				background-color: #222222;
				border: 1px solid #00FF00;
				padding: 5px 15px;
				border-radius: 5px;
				cursor: pointer;
				transition: all 0.2s;
			}
			button:hover {
				color: #222222;
				background-color: #00FF00;
			}
			button:active {
				transform: scale(0.9);
			}
			
			.status {
				border-radius: 5px;
				transition: 
					opacity 0.3s ease, 
					transform 0.4s cubic-bezier(0.3, 1.5, 0.7, 1);
			}
			.statusHidden {
				max-height: 0px;
				opacity: 0;
				transform: scale(0.9) translate3d(0, -10px, 0); 
				pointer-events: none;
				visibility: hidden;
				transition: 
					opacity 0.3s ease, 
					transform 0.3s ease, 
					max-height 0.4s ease, 
					visibility 0.3s;
			}
			.statusShown {
				opacity: 1;
				transform: scale(1) translate3d(0, 0, 0);
				pointer-events: auto;
				visibility: visible;
			}
			
			summary {
				color: #00FF00;
				font-weight: bold;
				margin-top: 1px;
				margin-bottom: 1px;
				border-radius: 5px;
				cursor: pointer;
				-webkit-tap-highlight-color: transparent;
				outline: none;
				transition: background-color 0.2s ease;
			}
			summary:hover {
				background-color: rgba(0, 255, 0, 0.1);
			}
			summary:active {
				background-color: rgba(0, 255, 0, 0.3);
				transition: background-color 0.1s ease;
			}
			details {
				margin-left: 20px;
			}
			
			.leafNode {
				color: #DDDDDD;
				margin-top: 1px;
				margin-left: 20px;
				margin-bottom: 1px;
				border-radius: 3px;
				word-break: break-all;
				line-height: 1.2;
			}
			.leafNode:hover {
				background-color: rgba(255, 255, 255, 0.1);
			}
			.leafNode:active {
				background-color: rgba(255, 255, 255, 0.3);
				transition: background-color 0.1s ease;
			}
			.treeViewer {
				/* background-color: rgba(102, 102, 102, 0.6); */
				border-radius: 20px;
				margin-bottom: 10px;
				padding: 5px;
			}
			
			.stringColor {
				color: chocolate;
			}
			.charColor {
				color: #00FF00;
				font-weight: bold;
			}
			.intColor, 
			.longColor, 
			.floatColor, 
			.doubleColor {
				color: orange;
			}
			.booleanColor, 
			.nullColor, 
			.undefinedColor {
				color: #3377FF; /* blue */
			}
		</style>
	</head>
	<body>
		<script type="text/javascript" src="main.js" color="255,255,255" opacity=0.8></script>
		
		<div id="welcome" class="caption"><b>Welcome to the web UI of the Bypasser rooting-layer system module! </b></div>
		<div id="actionContainer" class="container">
			<b>Action</b>
			<div id="actionSlot" class="content loadingColor">Please wait while loading the action slot. </div>
			<div id="actionButtons" class="content buttonGroup informationColor">
				<button id="actionButton" onclick="displayActionSlot();">Refresh</button>
				<button id="actionButtonA" onclick="swapActionSlotTo('A');">Swap to A</button>
				<button id="actionButtonB" onclick="swapActionSlotTo('B');">Swap to B</button>
			</div>
			<div id="actionStatus" class="content status statusHidden informationColor"></div>
		</div>
		<div id="databaseContainer" class="container">
			<b>Database</b>
			<div id="databaseTree" class="content loadingColor">Please wait while loading the database. </div>
			<div id="databaseButtons" class="content buttonGroup informationColor">
				<button id="databaseButton" onclick="displayDatabaseTree();">Refresh</button>
			</div>
		</div>
		<div id="aboutContainer" class="container">
			<b>About</b>
			<div id="aboutLRFP" class="content informationColor"><a href="https://github.com/LRFP-Team/LRFP" target="blank">https://github.com/LRFP-Team/LRFP</a></div>
			<div id="aboutBypasser" class="content informationColor"><a href="https://github.com/LRFP-Team/Bypasser" target="blank">https://github.com/LRFP-Team/Bypasser</a></div>
		</div>
		
		<script type="text/javascript">
			const EXIT_SUCCESS = 0;
			const EXIT_FAILURE = 1;
			const EOF = (-1);
			
			function displayActionSlot() {
				if (isDisplayingActionSlot) {
					console.debug("Debug: ``true === isDisplayingActionSlot;``");
					return;
				}
				isDisplayingActionSlot = true;
				console.debug("Debug: ``isDisplayingActionSlot = true;``");
				const actionSlotElement = document.getElementById("actionSlot");
				actionSlotElement.innerHTML = "Please wait while loading the action slot. ";
				actionSlotElement.className = "content loadingColor";
				fetch(`./${actionSlotFileName}`)
					.then(response => response.text())
					.then(data => {
						const dataTrimmed = data.trim();
						if ("A" === dataTrimmed || "B" === dataTrimmed) {
							actionSlotElement.innerHTML = `The current action slot is <b>${dataTrimmed}</b>. `;
							actionSlotElement.className = "content informationColor";
							console.log(`Info: The current action slot is <b>${dataTrimmed}</b>. `);
						} else {
							actionSlotElement.innerHTML = "<b>Error</b>: An invalid action slot value is detected. ";
							actionSlotElement.className = "content errorColor";
							console.error("Error: An invalid action slot value is detected. ");
						}
					})
					.catch(error => {
						const actionSlotElement = document.getElementById("actionSlot");
						actionSlotElement.innerHTML = "<b>Fatal</b>: Cannot fetch or parse the action slot. ";
						actionSlotElement.className = "content fatalColor";
						console.error("Fatal: Failed to fetch or parse the action slot due to the following error. \n", error);
					})
					 .finally(() => {
						isDisplayingActionSlot = false;
						console.debug("Debug: ``isDisplayingActionSlot = false;``");
					});
			}
			async function swapActionSlotTo(targetValue) {
				if (isSwappingActionSlot) {
					console.debug("Debug: ``true === isSwappingActionSlot;``");
					return;
				}
				isSwappingActionSlot = true;
				console.debug("Debug: ``isSwappingActionSlot = true;``");
				const actionStatusElement = document.getElementById("actionStatus");
				const defaultDisplayTime = 5000; /* millisecond(s) */
				if (window.ksu !== undefined && window.ksu.exec !== undefined) {
					if ("A" === targetValue || "B" === targetValue) {
						const { errno, stdout, stderr } = await window.ksu.exec(
							`chmod u+w "${actionSlotFilePath}" && echo -n "${targetValue}" > "${actionSlotFilePath}" && chmod -w "${actionSlotFilePath}"`
						);
						if (EXIT_SUCCESS === errno) {
							actionStatusElement.innerHTML = `Successfully swapped the action slot to ${targetValue}. `
							actionStatusElement.className = "content status statusShown informationColor";
							console.log(`Info: Successfully swapped the action slot to ${targetValue}. `);
							displayActionSlot();
							setTimeout(() => {
								actionStatusElement.className = "content status statusHidden informationColor";
								actionStatusElement.innerHTML = "";
								console.debug("Debug: Successfully hid the action status. ");
								isSwappingActionSlot = false;
								displayActionSlot();
							}, defaultDisplayTime);
						} else {
							actionStatusElement.innerHTML = `<b>Error</b>: Failed to swap the action slot to ${targetValue}. `
							actionStatusElement.className = "content status statusShown errorColor";
							console.error(`Error: Failed to update the action slot to ${targetValue} due to the following error. `, { errno, stdout, stderr });
							setTimeout(() => {
								actionStatusElement.className = "content status statusHidden informationColor";
								actionStatusElement.innerHTML = "";
								console.debug("Debug: Successfully hid the action status. ");
								isSwappingActionSlot = false;
								console.debug("Debug: ``isSwappingActionSlot = false;``");
							}, defaultDisplayTime);
						}
					} else {
						actionStatusElement.innerHTML = "<b>Warning</b>: Skipped swapping the action slot due to the invalid parameter passed. "
						actionStatusElement.className = "content status statusShown warningColor";
						console.warn("Warning: Failed to update the action slot due to the invalid parameter passed. ");
						setTimeout(() => {
							actionStatusElement.className = "content status statusHidden informationColor";
							actionStatusElement.innerHTML = "";
							console.debug("Debug: Successfully hid the action status. ");
							isSwappingActionSlot = false;
							console.debug("Debug: ``isSwappingActionSlot = false;``");
						}, defaultDisplayTime);
					}
				} else {
					actionStatusElement.innerHTML = `<b>Fatal</b>: Failed to swap the action slot to ${targetValue} due to the undefined \`\`window.ksu.exec\`\`. `
					actionStatusElement.className = "content status statusShown fatalColor";
					console.error(`Fatal: Failed to swap the action slot to ${targetValue} due to the undefined \`\`window.ksu.exec\`\`. `);
					setTimeout(() => {
						actionStatusElement.className = "content status statusHidden informationColor";
						actionStatusElement.innerHTML = "";
						console.debug("Debug: Successfully hid the action status. ");
						isSwappingActionSlot = false;
						console.debug("Debug: ``isSwappingActionSlot = false;``");
					}, defaultDisplayTime);
				}
			}
			
			function renderTree(key, value) {
				if (typeof key === "string" && typeof value === "object" && value !== null) {
					if ("" === key || "_" === key || "*" === key) {
						const fragment = document.createDocumentFragment();
						if (Array.isArray(value)) {
							value.forEach(item => {
								const itemDiv = document.createElement("div");
								itemDiv.className = "leafNode";
								const itemSpan = document.createElement("span");
								itemSpan.textContent = `"${item}"`; 
								itemSpan.className = "stringColor";
								itemDiv.appendChild(itemSpan);
								fragment.appendChild(itemDiv);
							});
						} else {
							Object.keys(value).forEach(subKey => {
								fragment.appendChild(renderTree(subKey, value[subKey]));
							});
						}
						return fragment;
					} else {
						const details = document.createElement("details");
						const summary = document.createElement("summary");
						if (1 === key.length && 'A' <= key && key <= 'Z') {
							summary.textContent = key;
						} else {
							const keySpan = document.createElement("span");
							keySpan.textContent = `"${key}"`;
							keySpan.className = "stringColor";
							summary.appendChild(keySpan);
						}
						details.appendChild(summary);
						if (Array.isArray(value)) {
							value.forEach(item => {
								const itemDiv = document.createElement("div");
								itemDiv.className = "leafNode";
								const itemSpan = document.createElement("span");
								itemSpan.textContent = `"${item}"`; 
								itemSpan.className = "stringColor";
								itemDiv.appendChild(itemSpan);
								details.appendChild(itemDiv);
							});
						} else {
							Object.keys(value).forEach(subKey => {
								details.appendChild(renderTree(subKey, value[subKey]));
							});
						}
						return details;
					}
				} else {
					const leafElement = document.createElement("div");
					leafElement.className = "leafNode";
					const keySpan = document.createElement("span"), valueSpan = document.createElement("span");
					if (typeof key === "string") {
						if (1 === key.length && 'A' <= key && key <= 'Z') {
							keySpan.textContent = key;
							keySpan.className = "charColor";
						} else {
							keySpan.textContent = `"${key}"`;
							keySpan.className = "stringColor";
						}
					} else {
						keySpan.textContent = "undefined";
						keySpan.className = "undefinedColor";
					}
					if (typeof value === "string") {
						valueSpan.textContent = `"${value}"`;
						valueSpan.className = "stringColor";
					} else if (typeof value === "boolean") {
						valueSpan.textContent = value ? "true" : "false";
						valueSpan.className = "booleanColor";
					} else if (null === value) {
						valueSpan.textContent = "null";
						valueSpan.className = "nullColor";
					}
					leafElement.appendChild(keySpan);
					leafElement.appendChild(document.createTextNode(": "));
					leafElement.appendChild(valueSpan);
					return leafElement;
				}
			}
			function displayDatabaseTree() {
				if (isDisplayingDatabaseTree) {
					console.debug("Debug: ``true === isDisplayingDatabaseTree;``");
					return;
				}
				isDisplayingDatabaseTree = true;
				console.debug("Debug: ``isDisplayingDatabaseTree = true;``");
				fetch("./database.json")
					.then(response => response.json())
					.then(jsonData => {
						const databaseElement = document.getElementById("databaseTree");
						databaseElement.innerHTML = "";
						databaseElement.className = "treeViewer informationColor";
						Object.keys(jsonData).forEach(rootKey => {
							databaseElement.appendChild(renderTree(rootKey, jsonData[rootKey]));
						});
						console.log("Info: Successfully displayed the database tree. ");
					})
					.catch(error => {
						const databaseElement = document.getElementById("databaseTree");
						databaseElement.innerHTML = "<b>Fatal</b>: Cannot fetch or parse the database. ";
						databaseElement.className = "content fatalColor";
						console.error("Fatal: Failed to load the database due to the following error. \n", error);
					})
					 .finally(() => {
						isDisplayingDatabaseTree = false;
						console.debug("Debug: ``isDisplayingDatabaseTree = false;``");
					});
			}
			
			const moduleId = "bypasser"
			const actionSlotFileName = "action.prop"
			const actionSlotFilePath = `/data/adb/modules/${moduleId}/${actionSlotFileName}`
			
			let isDisplayingActionSlot = false;
			let isSwappingActionSlot = false;
			let isDisplayingDatabaseTree = false;
			
			if (window.apatch !== undefined && window.apatch.ksu === undefined) {
				window.ksu = window.apatch;
			}
			displayActionSlot();
			displayDatabaseTree();
		</script>
	</body>
</html>
